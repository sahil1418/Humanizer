# Model configuration — Personal Use (single model)
default_model: "flan-t5-xl"
device: "auto"          # auto, cpu, cuda, mps
dtype: "float16"        # float16 for L4 GPU (24GB VRAM)

# Model-specific overrides
models:
  flan-t5-xl:
    max_input_length: 1024
    max_output_length: 1024
    dtype: "float16"

  flan-t5-base:
    max_input_length: 512
    max_output_length: 512
    dtype: "float32"     # fallback model for testing

  flan-t5-large:
    max_input_length: 1024
    max_output_length: 1024
    dtype: "float16"

# Inference server
inference:
  backend: "transformers"
  batch_size: 1
  continuous_batching: false
